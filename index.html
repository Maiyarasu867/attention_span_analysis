<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sensor Hub Pro | Full Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b22;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-amber: #d29922;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
        }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px 0; font-family: 'Inter', sans-serif; }
        .card { background-color: var(--card-bg); border: 1px solid #30363d; border-radius: 12px; margin-bottom: 15px; }
        .card-header { background-color: #21262d; color: var(--accent-blue); font-weight: 700; border-bottom: 1px solid #30363d; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        
        .sensor-label { font-size: 0.85rem; color: var(--text-dim); margin-top: 10px; display: block; }
        .sensor-val { color: var(--accent-amber); font-family: 'JetBrains Mono', monospace; font-weight: bold; float: right; }
        
        .form-range { height: 1.5rem; }
        .form-control { background-color: #0d1117; color: white; border: 1px solid #30363d; font-size: 0.9rem; }
        .form-control:focus { background-color: #161b22; color: white; border-color: var(--accent-blue); box-shadow: none; }

        .table { color: var(--text-main); font-size: 0.85rem; }
        .table thead th { border-bottom: 2px solid #30363d; color: var(--text-dim); }
        
        #logConsole { height: 140px; overflow-y: scroll; background: #010409; color: var(--accent-green); padding: 10px; border-radius: 0 0 12px 12px; font-family: monospace; font-size: 0.75rem; border-top: 1px solid #30363d; }
        
        .btn-speed { background: #21262d; border: 1px solid #30363d; color: var(--text-main); font-size: 0.8rem; }
        .btn-speed.active { background: var(--accent-blue); color: #000; font-weight: bold; }
        .badge-status { font-size: 0.7rem; border: 1px solid; background: transparent; }
    </style>
</head>
<body>
    <div class="container-fluid px-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="m-0">AI Sensor <span style="color:var(--accent-blue)">Hub Pro</span></h3>
            <div id="connBadge" class="badge rounded-pill bg-secondary">Offline</div>
        </div>

        <div class="card mb-3">
            <div class="card-body p-2">
                <div class="row g-2">
                    <div class="col-md-3"><input type="password" id="apiKey" class="form-control" placeholder="API Key"></div>
                    <div class="col-md-4"><input type="text" id="databaseURL" class="form-control" placeholder="Firebase DB URL"></div>
                    <div class="col-md-3"><input type="text" id="projectId" class="form-control" placeholder="Project ID"></div>
                    <div class="col-md-2"><button id="btnConnect" class="btn btn-primary w-100 fw-bold btn-sm">Connect</button></div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-5">
                <div class="card">
                    <div class="card-header">Transmission Speed</div>
                    <div class="card-body py-2">
                        <div class="btn-group w-100">
                            <button class="btn btn-speed active" data-ms="2000">2s</button>
                            <button class="btn btn-speed" data-ms="1000">1s</button>
                            <button class="btn btn-speed" data-ms="300">0.3s</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">Sensor Parameters</div>
                    <div class="card-body pt-0">
                        <div class="row">
                            <div class="col-6">
                                <span class="sensor-label">HRV Target <span class="sensor-val" id="disp_hrv_t">55</span></span>
                                <input type="range" class="form-range" id="hrv_t" min="25" max="80" value="55">
                            </div>
                            <div class="col-6">
                                <span class="sensor-label">HRV Prob% <span class="sensor-val" id="disp_hrv_p">80</span></span>
                                <input type="range" class="form-range" id="hrv_p" min="0" max="100" value="80">
                            </div>
                            <div class="col-6">
                                <span class="sensor-label">Motion Target <span class="sensor-val" id="disp_mov_t">0.30</span></span>
                                <input type="range" class="form-range" id="mov_t" min="0.05" max="0.80" step="0.01" value="0.30">
                            </div>
                            <div class="col-6">
                                <span class="sensor-label">Motion Prob% <span class="sensor-val" id="disp_mov_p">20</span></span>
                                <input type="range" class="form-range" id="mov_p" min="0" max="100" value="20">
                            </div>
                            <div class="col-6">
                                <span class="sensor-label">Noise Max <span class="sensor-val" id="disp_noi_t">3</span></span>
                                <input type="range" class="form-range" id="noi_t" min="0" max="6" value="3">
                            </div>
                            <div class="col-6">
                                <span class="sensor-label">Noise Prob% <span class="sensor-val" id="disp_noi_p">30</span></span>
                                <input type="range" class="form-range" id="noi_p" min="0" max="100" value="30">
                            </div>
                            <div class="col-6">
                                <span class="sensor-label">Light Target <span class="sensor-val" id="disp_lig_t">0.15</span></span>
                                <input type="range" class="form-range" id="lig_t" min="0.01" max="0.40" step="0.01" value="0.15">
                            </div>
                            <div class="col-6">
                                <span class="sensor-label">Light Prob% <span class="sensor-val" id="disp_lig_p">15</span></span>
                                <input type="range" class="form-range" id="lig_p" min="0" max="100" value="15">
                            </div>
                        </div>
                    </div>
                </div>
                <button id="btnToggle" class="btn btn-success w-100 fw-bold py-2 mb-3" disabled>START STREAM</button>
            </div>

            <div class="col-lg-7">
                <div class="card h-100">
                    <div class="card-header d-flex justify-content-between">
                        <span>Live Stream Data</span>
                        <span id="winCount" style="color:var(--accent-amber)">Total: 0</span>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-dark">
                            <thead>
                                <tr>
                                    <th>HRV</th>
                                    <th>Motion</th>
                                    <th>Noise</th>
                                    <th>Light</th>
                                    <th>State</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <tr><td colspan="5" class="text-center py-4 text-muted">Initialize connection to see data...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div id="logConsole"></div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
